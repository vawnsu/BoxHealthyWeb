# ===================================================================
# APPLICATION CORE CONFIGURATIONS
# ===================================================================
spring.application.name=BoxHealthyWeb

# Use local profile only when explicitly enabled locally.
# spring.profiles.default=local

# ===================================================================
# SERVER & VIEW RESOLVER CONFIGURATIONS (FOR JSP)
# ===================================================================
server.port=${PORT:8080}

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=20000

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ===================================================================
# MULTIPART FILE UPLOADS
# Ready for admin product image uploads when file-upload storage is added
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Uploaded product images are stored outside compiled artifacts
app.upload.product-dir=${user.dir}/uploads/products
app.upload.product-url-prefix=/uploads/products

# ===================================================================
# JACKSON JSON SERIALIZATION
# Kept for date-time consistency if MVC pages later use JSON helpers
# ===================================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===================================================================
# LOGGING CONFIGURATIONS
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.boxhealthy=DEBUG

# ===================================================================
# ADMIN EMAIL NOTIFICATIONS
# Disabled by default. Configure SMTP in .env on the server to enable.
# ===================================================================
app.notification.email.enabled=${ADMIN_EMAIL_ENABLED:false}
app.notification.email.to=${ADMIN_NOTIFY_EMAIL:}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# ===================================================================
# JPA / MYSQL (schema created via database/deploy-mysql-full.sql)
# ===================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# ===================================================================
# SESSION SECURITY
# Spring Security uses server-side session login, no JWT
# ===================================================================
server.servlet.session.timeout=30m

# ===================================================================
# DATA SEEDING
# Disabled because database/schema.sql owns table creation and sample data
# ===================================================================
boxhealthy.seed.enabled=false
