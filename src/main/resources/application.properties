# ===================================================================
# APPLICATION CORE CONFIGURATIONS
# ===================================================================
spring.application.name=BoxHealthyWeb

# Use local profile only when explicitly enabled locally.
# spring.profiles.default=local

# ===================================================================
# SERVER & VIEW RESOLVER CONFIGURATIONS (FOR JSP)
# ===================================================================
server.port=${PORT:8080}

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ===================================================================
# MULTIPART FILE UPLOADS
# Ready for admin product image uploads when file-upload storage is added
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Uploaded product images are stored outside compiled artifacts
app.upload.product-dir=${user.dir}/uploads/products
app.upload.product-url-prefix=/uploads/products

# ===================================================================
# JACKSON JSON SERIALIZATION
# Kept for date-time consistency if MVC pages later use JSON helpers
# ===================================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Ho_Chi_Minh

# ===================================================================
# LOGGING CONFIGURATIONS
# ===================================================================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.com.boxhealthy=DEBUG

# ===================================================================
# JPA / SQL SERVER (schema created via database/schema.sql)
# ===================================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# ===================================================================
# SESSION SECURITY
# Spring Security uses server-side session login, no JWT
# ===================================================================
server.servlet.session.timeout=30m

# ===================================================================
# DATA SEEDING
# Disabled because database/schema.sql owns table creation and sample data
# ===================================================================
boxhealthy.seed.enabled=false
