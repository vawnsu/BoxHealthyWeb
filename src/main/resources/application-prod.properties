# Production profile. Pass values via environment variables on the server.
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false

logging.level.com.boxhealthy=INFO

app.upload.product-dir=${UPLOAD_PRODUCT_DIR:/opt/boxhealthy/uploads/products}
app.upload.product-url-prefix=/uploads/products
